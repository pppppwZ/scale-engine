<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCALE Engine — Artifact Flow</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #e0e0e0; }
    nav { background: #1a1a1a; padding: 1rem; display: flex; gap: 1rem; }
    nav a { color: #808080; text-decoration: none; }
    nav a:hover { color: #fff; }
    nav a.active { color: #00ff88; }
    main { padding: 2rem; }
    h1 { color: #00ff88; margin-bottom: 1rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }
    .card { background: #1a1a1a; border: 1px solid #333; padding: 1rem; border-radius: 8px; }
    .card h2 { color: #fff; font-size: 1rem; margin-bottom: 0.5rem; }
    .status { font-size: 0.75rem; padding: 0.25rem 0.5rem; border-radius: 4px; }
    .status.DONE { background: #00ff88; color: #000; }
    .status.BLOCKED { background: #ff4444; color: #fff; }
    .status.IN_PROGRESS { background: #ffaa00; color: #000; }
    .meta { color: #808080; font-size: 0.75rem; margin-top: 0.5rem; }
    #refresh { background: #00ff88; color: #000; border: none; padding: 0.5rem 1rem; cursor: pointer; }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="active">Artifacts</a>
    <a href="/sessions">Sessions</a>
    <a href="/knowledge">Knowledge</a>
    <a href="/evolution">Evolution</a>
    <a href="/agents">Agents</a>
    <button id="refresh">Refresh</button>
  </nav>
  <main>
    <h1>Artifact Flow</h1>
    <div class="grid" id="artifacts"></div>
  </main>
  <script>
    async function loadArtifacts() {
      const res = await fetch('/api/artifacts')
      const artifacts = await res.json()
      const grid = document.getElementById('artifacts')
      grid.innerHTML = artifacts.map(a => `
        <div class="card">
          <h2>${a.title}</h2>
          <span class="status ${a.status}">${a.status}</span>
          <div class="meta">
            ${a.type} | ${new Date(a.createdAt).toLocaleString()}
          </div>
        </div>
      `).join('')
    }
    document.getElementById('refresh').onclick = loadArtifacts
    loadArtifacts()
    setInterval(loadArtifacts, 5000)
  </script>
</body>
</html>
