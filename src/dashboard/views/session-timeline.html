<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCALE Engine — Session Timeline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #e0e0e0; }
    nav { background: #1a1a1a; padding: 1rem; display: flex; gap: 1rem; }
    nav a { color: #808080; text-decoration: none; }
    nav a:hover { color: #fff; }
    nav a.active { color: #00ff88; }
    main { padding: 2rem; }
    h1 { color: #00ff88; margin-bottom: 1rem; }
    .timeline { display: flex; flex-direction: column; gap: 1rem; }
    .session { background: #1a1a1a; padding: 1rem; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
    .session-info { display: flex; gap: 2rem; }
    .artifacts-badge { background: #00ff88; color: #000; padding: 0.25rem 0.5rem; border-radius: 4px; }
  </style>
</head>
<body>
  <nav>
    <a href="/">Artifacts</a>
    <a href="/sessions" class="active">Sessions</a>
    <a href="/knowledge">Knowledge</a>
    <a href="/evolution">Evolution</a>
    <a href="/agents">Agents</a>
  </nav>
  <main>
    <h1>Session Timeline</h1>
    <div class="timeline" id="sessions"></div>
  </main>
  <script>
    async function loadSessions() {
      const res = await fetch('/api/sessions')
      const sessions = await res.json()
      const timeline = document.getElementById('sessions')
      timeline.innerHTML = sessions.map(s => `
        <div class="session">
          <div class="session-info">
            <span>${s.id}</span>
            <span>${new Date(s.startedAt).toLocaleString()}</span>
          </div>
          <span class="artifacts-badge">${s.artifacts} artifacts</span>
        </div>
      `).join('')
    }
    loadSessions()
  </script>
</body>
</html>
