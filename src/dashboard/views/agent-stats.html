<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCALE Engine — Agent Stats</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f0f0f; color: #e0e0e0; }
    nav { background: #1a1a1a; padding: 1rem; display: flex; gap: 1rem; }
    nav a { color: #808080; text-decoration: none; }
    nav a:hover { color: #fff; }
    nav a.active { color: #00ff88; }
    main { padding: 2rem; }
    h1 { color: #00ff88; margin-bottom: 1rem; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 1rem; text-align: left; border-bottom: 1px solid #333; }
    th { color: #00ff88; }
    .bar { height: 20px; background: #333; border-radius: 4px; }
    .bar-fill { height: 100%; background: #00ff88; border-radius: 4px; }
  </style>
</head>
<body>
  <nav>
    <a href="/">Artifacts</a>
    <a href="/sessions">Sessions</a>
    <a href="/knowledge">Knowledge</a>
    <a href="/evolution">Evolution</a>
    <a href="/agents" class="active">Agents</a>
  </nav>
  <main>
    <h1>Agent Stats</h1>
    <table>
      <thead>
        <tr><th>Agent</th><th>Dispatches</th><th>Success Rate</th></tr>
      </thead>
      <tbody id="agents"></tbody>
    </table>
  </main>
  <script>
    async function loadAgents() {
      const res = await fetch('/api/agents')
      const agents = await res.json()
      const tbody = document.getElementById('agents')
      tbody.innerHTML = agents.map(a => `
        <tr>
          <td>${a.name}</td>
          <td>${a.dispatchCount}</td>
          <td>
            <div class="bar">
              <div class="bar-fill" style="width: ${a.successRate * 100}%"></div>
            </div>
          </td>
        </tr>
      `).join('')
    }
    loadAgents()
  </script>
</body>
</html>
